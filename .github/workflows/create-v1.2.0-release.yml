name: Create v1.2.0 Release

on:
  push:
    branches: [main]
    paths: ['.github/workflows/create-v1.2.0-release.yml']

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release notes
        run: |
          cat > release-notes.md << 'EOF'
          ## What's New in v1.2.0

          ### MCP Integration & Hooks
          - Added MCP server integration for PayIt2 API connectivity
          - Added plugin hooks system for automated workflows

          ### Organizer-Facing Advanced Features
          - Enhanced campaign creation with advanced organizer tools
          - Improved campaign analytics and health scoring

          ### Repository Improvements
          - Added PR template with standards checklist
          - Standardized CLAUDE.md with mandatory session start
          - Deduplicated git workflow to reference PLATFORM-STANDARDS Section 15
          - Added platform roadmap reference to OPEN_ITEMS
          - Logged terminology audit item for future migration

          **Full Changelog**: https://github.com/PayIt2/payit2-campaign-coach/compare/v1.0.4...v1.2.0
          EOF

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v1.2.0 \
            --target main \
            --title "v1.2.0 — MCP Integration, Hooks, and Advanced Features" \
            --notes-file release-notes.md

      - name: Clean up this workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main
          git rm .github/workflows/create-v1.2.0-release.yml
          git commit -m "chore: remove one-time v1.2.0 release workflow [skip ci]"
          git push origin main
